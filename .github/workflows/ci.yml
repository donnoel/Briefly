name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/Developer/Xcode/DerivedData/ModuleCache.noindex
          key: spm-${{ runner.os }}-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Resolve packages
        run: xcodebuild -resolvePackageDependencies -project Briefly.xcodeproj

      - name: Build and test
        run: |
          set -euo pipefail
          DESTINATION=$(xcodebuild -project Briefly.xcodeproj -scheme Briefly -showdestinations | ruby -e 'out = STDIN.read; sim_lines = out.lines.grep(/\{ platform:iOS Simulator,/); abort("No iOS Simulator destinations available") if sim_lines.empty?; parsed = sim_lines.filter_map { |line| m = line.match(/OS:([^,]+), name:([^}]+) \}/); next unless m; { os: m[1].strip, name: m[2].strip } }; abort("Unable to parse simulator destinations") if parsed.empty?; preferred = ["iPhone 17 Pro", "iPhone 16 Pro", "iPhone 16", "iPhone SE (3rd generation)"]; pick = preferred.map { |n| parsed.find { |d| d[:name] == n } }.compact.first || parsed.find { |d| d[:name].start_with?("iPhone") } || parsed.first; print "platform=iOS Simulator,OS=#{pick[:os]},name=#{pick[:name]}"')

          xcodebuild \
            -project Briefly.xcodeproj \
            -scheme Briefly \
            -destination "$DESTINATION" \
            -destination-timeout 180 \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            clean test

      - name: Upload xcodebuild logs (if the job fails)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-logs
          path: ~/Library/Logs/DiagnosticReports
