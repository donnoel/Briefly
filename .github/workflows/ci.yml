name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/Developer/Xcode/DerivedData/ModuleCache.noindex
          key: spm-${{ runner.os }}-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Resolve packages
        run: xcodebuild -resolvePackageDependencies -project Briefly.xcodeproj

      - name: Build and test
        run: |
          set -euo pipefail
          SIM_ID=$(xcrun simctl list devices available --json | ruby -rjson -e 'r = JSON.parse(STDIN.read); preferred = ["iPhone 16 Pro", "iPhone 16", "iPhone 15 Pro", "iPhone 15"]; devices = r.fetch("devices").values.flatten.select { |d| d["isAvailable"] && d["name"] && d["udid"] }; iphones = devices.select { |d| d["name"].start_with?("iPhone") }; abort("No available iPhone simulators found") if iphones.empty?; pick = preferred.map { |name| iphones.find { |d| d["name"] == name } }.compact.first || iphones.first; print pick.fetch("udid")')

          xcodebuild \
            -project Briefly.xcodeproj \
            -scheme Briefly \
            -destination "id=$SIM_ID" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            clean test

      - name: Upload xcodebuild logs (if the job fails)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-logs
          path: ~/Library/Logs/DiagnosticReports
