name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/Developer/Xcode/DerivedData/ModuleCache.noindex
          key: spm-${{ runner.os }}-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Resolve packages
        run: xcodebuild -resolvePackageDependencies -project Briefly.xcodeproj

      - name: Build and test
        run: |
          set -euo pipefail
          RUNTIME=$(xcrun simctl list runtimes available --json | ruby -rjson -e 'r = JSON.parse(STDIN.read); i = r.fetch("runtimes").find { |rt| rt["platform"] == "iOS" }; abort("No available iOS runtime") unless i; print i.fetch("identifier")')
          DEVICE_TYPE=$(xcrun simctl list devicetypes --json | ruby -rjson -e 'r = JSON.parse(STDIN.read); iphones = r.fetch("devicetypes").select { |dt| dt["name"].start_with?("iPhone") }; abort("No iPhone device types found") if iphones.empty?; preferred = ["iPhone 16 Pro", "iPhone 16", "iPhone 15 Pro", "iPhone 15"]; pick = preferred.map { |name| iphones.find { |dt| dt["name"] == name } }.compact.first || iphones.first; print pick.fetch("identifier")')
          SIM_NAME="CI-iPhone"
          SIM_ID=$(xcrun simctl create "$SIM_NAME" "$DEVICE_TYPE" "$RUNTIME")
          trap 'xcrun simctl delete "$SIM_ID" || true' EXIT

          xcodebuild \
            -project Briefly.xcodeproj \
            -scheme Briefly \
            -destination "id=$SIM_ID" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            clean test

      - name: Upload xcodebuild logs (if the job fails)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-logs
          path: ~/Library/Logs/DiagnosticReports
